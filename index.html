<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProseMirror Editor Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        margin-bottom: 20px;
        color: #333;
      }
      .editor-wrapper {
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 10px;
        min-height: 200px;
      }
      .output {
        margin-top: 20px;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 4px;
        border: 1px solid #e0e0e0;
      }
      .output h3 {
        margin-bottom: 10px;
        color: #666;
        font-size: 14px;
      }
      .output pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/demo/main.ts"></script>
  </body>
</html>
